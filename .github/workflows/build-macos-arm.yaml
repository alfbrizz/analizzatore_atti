name: Build macOS Apple Silicon

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Mostra file disponibili
        run: |
          pwd
          find . -maxdepth 2 -type f | sort

      - name: Verifica file necessari
        run: |
          test -f analizzatore_atti.py
          test -f requirements-build.txt

      - name: Verifica Apple Silicon
        run: |
          echo "Architettura: $(uname -m)"
          test "$(uname -m)" = "arm64"

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "arm64"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Compila AnonimizzatoreAtti
        run: |
          python -m PyInstaller \
            --clean \
            --noconfirm \
            --onefile \
            --console \
            --name AnonimizzatoreAtti \
            --collect-all pypdf \
            analizzatore_atti.py

      - name: Verifica risultato
        run: |
          test -f dist/AnonimizzatoreAtti
          file dist/AnonimizzatoreAtti
          lipo -archs dist/AnonimizzatoreAtti

      - name: Crea archivio ZIP
        run: |
          ditto -c -k \
            --sequesterRsrc \
            dist/AnonimizzatoreAtti \
            AnonimizzatoreAtti-macOS-arm64.zip

      - name: Carica artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnonimizzatoreAtti-macOS-arm64
          path: AnonimizzatoreAtti-macOS-arm64.zip
          if-no-files-found: error

      - name: Allega alla Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AnonimizzatoreAtti-macOS-arm64.zip
