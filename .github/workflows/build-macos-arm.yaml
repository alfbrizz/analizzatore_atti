name: Build macOS Apple Silicon

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm:
    runs-on: macos-14

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Verifica runner Apple Silicon
        run: |
          uname -m
          sw_vers

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "arm64"
          cache: "pip"

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          python -m pip install pyinstaller

      - name: Verifica file principale
        run: |
          test -f analizzatore_atti.py
          ls -la

      - name: Crea applicazione macOS ARM
        run: |
          python -m PyInstaller \
            --clean \
            --noconfirm \
            --windowed \
            --name "AnonimizzatoreAtti" \
            analizzatore_atti.py

      - name: Verifica applicazione e architettura
        run: |
          test -d "dist/AnonimizzatoreAtti.app"

          file \
            "dist/AnonimizzatoreAtti.app/Contents/MacOS/AnonimizzatoreAtti"

          ARCH="$(uname -m)"
          echo "Architettura runner: $ARCH"

          if [ "$ARCH" != "arm64" ]; then
            echo "ERRORE: il runner non è Apple Silicon"
            exit 1
          fi

      - name: Comprimi applicazione
        run: |
          ditto -c -k \
            --sequesterRsrc \
            --keepParent \
            "dist/AnonimizzatoreAtti.app" \
            "AnonimizzatoreAtti-macOS-arm64.zip"

      - name: Carica il risultato
        uses: actions/upload-artifact@v4
        with:
          name: AnonimizzatoreAtti-macOS-arm64
          path: AnonimizzatoreAtti-macOS-arm64.zip
          if-no-files-found: error
